name: Reap stale work

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report stale work without changing issues"
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: reap-stale-work
  cancel-in-progress: false

jobs:
  reap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Release stale claims and rework
        env:
          GH_TOKEN: ${{ github.token }}
          FOR_GOOD_REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: scripts/reap.sh

# Keep stream:<n> labels and inherited stream priority in sync — label
# bookkeeping only, zero model tokens.
# See docs/STREAMS.md for the Stream concept.
#
# Rules:
#  - A "stage: discover" issue is always the ROOT of its own stream → create
#    and apply "stream:<n>" where n is its own number (this rule wins).
#  - Any other issue/PR whose body declares "Stream: #n" gets "stream:<n>",
#    PROVIDED #n is a real stream root (an existing "stage: discover" issue).
#  - Any issue/PR whose body starts a line with "Part of #p" (or a closing
#    ref) inherits the parent's stream:<n> label — line-anchored so prose
#    like "as part of #30's discussion" doesn't mis-parent it.
#  - A child issue/PR inherits "priority: high" from its stream root. Removing
#    that label from the root removes it from children too.
#  - When the LAST open child issue in a stream closes, the root issue gets
#    "status: needs-synthesis" — the human G1 queue. A genuinely NEW child
#    (or a reopened one) removes it again: synthesis waits for the drain.
name: Stream sync

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

# Serialize runs PER ISSUE/PR: same-item events must not race each other.
# A single global group is wrong here — GitHub keeps only one PENDING run per
# group and cancels older pending ones, so burst events (several issues edited
# at once) would silently drop label syncs. Per-item groups let different
# items run in parallel; the drain gate recounts open children live, so
# cross-item ordering doesn't matter.
concurrency:
  group: stream-sync-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.event.action != 'closed' && github.event.action != 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Apply stream and inherited priority labels
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
          BODY: ${{ github.event.issue.body || github.event.pull_request.body }}
          IS_PR: ${{ github.event.pull_request != null }}
          ACTION: ${{ github.event.action }}
          EVENT_LABEL: ${{ github.event.label.name || '' }}
          LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          stream=""

          # 1) A Discover issue always roots its own stream — nothing overrides this.
          if [ "$IS_PR" != "true" ]; then
            case ",$LABELS," in *",stage: discover,"*) stream="$NUM" ;; esac
          fi

          # 2) Explicit "Stream: #n" in the body.
          if [ -z "$stream" ]; then
            stream=$(printf '%s' "$BODY" | grep -oiE 'stream:[[:space:]]*#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          fi

          # 3) Else inherit from the parent named by a LINE-ANCHORED "Part of #p" /
          #    closing ref (prose like "as part of #30" must not mis-parent).
          if [ -z "$stream" ]; then
            parent=$(printf '%s' "$BODY" | grep -oiE '^[[:space:]]*(part of|closes|fixes|resolves)[[:space:]]*#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
            if [ -n "$parent" ]; then
              stream=$(gh issue view "$parent" --repo "$REPO" --json labels \
                --jq '[.labels[].name | select(startswith("stream:"))][0] // empty' 2>/dev/null | grep -oE '[0-9]+' || true)
            fi
          fi

          [ -z "$stream" ] && { echo "No stream to apply."; exit 0; }
          case "$stream" in ''|*[!0-9]*) echo "Non-numeric stream ref '$stream' — ignoring."; exit 0 ;; esac

          # VALIDATE: unless this issue is its own root, #stream must be a real
          # stream root — an existing "stage: discover" issue. Rejects junk like
          # "Stream: #999999" from drive-by bodies before it can mint labels.
          if [ "$stream" != "$NUM" ]; then
            root_labels=$(gh issue view "$stream" --repo "$REPO" --json labels --jq '[.labels[].name]|join(",")' 2>/dev/null || echo "__MISSING__")
            case ",$root_labels," in
              *",stage: discover,"*) : ;;
              *) echo "#$stream is not a valid stream root — refusing to apply."; exit 0 ;;
            esac
          fi
          label="stream:$stream"
          priority_label="priority: high"

          # Ensure the label exists (title of the root issue as description).
          if ! gh label list --repo "$REPO" --search "$label" --json name --jq '.[].name' | grep -qx "$label"; then
            title=$(gh issue view "$stream" --repo "$REPO" --json title --jq .title 2>/dev/null | cut -c1-80 || echo "")
            gh label create "$label" --repo "$REPO" --color "BFD4F2" \
              --description "Stream #$stream${title:+ — $title}" 2>/dev/null || true
          fi

          root_has_priority=false
          if gh issue view "$stream" --repo "$REPO" --json labels \
            --jq '.labels[].name' 2>/dev/null | grep -qx "$priority_label"; then
            root_has_priority=true
          fi

          sync_priority() {
            kind="$1"
            target="$2"

            # The root owns its priority label; never rewrite it from itself.
            if [ "$kind" = "issue" ] && [ "$target" = "$stream" ]; then
              return 0
            fi

            if [ "$root_has_priority" = "true" ]; then
              if [ "$kind" = "pr" ]; then
                gh pr edit "$target" --repo "$REPO" --add-label "$priority_label" || true
              else
                gh issue edit "$target" --repo "$REPO" --add-label "$priority_label" || true
              fi
            else
              if [ "$kind" = "pr" ]; then
                gh pr edit "$target" --repo "$REPO" --remove-label "$priority_label" 2>/dev/null || true
              else
                gh issue edit "$target" --repo "$REPO" --remove-label "$priority_label" 2>/dev/null || true
              fi
            fi
          }

          sync_stream_priority_children() {
            issue_nums=$(gh issue list --repo "$REPO" --state all --label "$label" \
              --json number --limit 1000 --jq '.[].number' 2>/dev/null || true)
            for child in $issue_nums; do
              [ "$child" = "$stream" ] && continue
              sync_priority issue "$child"
            done

            pr_nums=$(gh pr list --repo "$REPO" --state all --label "$label" \
              --json number --limit 1000 --jq '.[].number' 2>/dev/null || true)
            for child_pr in $pr_nums; do
              sync_priority pr "$child_pr"
            done
          }

          if [ "$IS_PR" = "true" ]; then
            gh pr edit "$NUM" --repo "$REPO" --add-label "$label" || true
            sync_priority pr "$NUM"
          else
            gh issue edit "$NUM" --repo "$REPO" --add-label "$label" || true
            sync_priority issue "$NUM"

            if [ "$NUM" = "$stream" ] && [ "$EVENT_LABEL" = "$priority_label" ]; then
              case "$ACTION" in
                labeled|unlabeled) sync_stream_priority_children ;;
              esac
            fi

            # A genuinely NEW child in a stream flagged for synthesis → the
            # drain isn't done after all; pull the root out of the G1 queue.
            # Only on 'opened' (edits/labels of old — possibly closed — children
            # must never strip the flag).
            if [ "$ACTION" = "opened" ] && [ "$NUM" != "$stream" ]; then
              if gh issue view "$stream" --repo "$REPO" --json labels --jq '[.labels[].name]|join(",")' 2>/dev/null | grep -q "status: needs-synthesis"; then
                gh issue edit "$stream" --repo "$REPO" --remove-label "status: needs-synthesis" || true
                gh issue comment "$stream" --repo "$REPO" --body "🔄 New work opened in this stream (#$NUM) — pulling it back out of the synthesis queue until the stream drains again." || true
              fi
            fi
          fi
          echo "Applied $label to #$NUM"

  synthesis-gate:
    if: github.event.action == 'closed' || github.event.action == 'reopened'
    runs-on: ubuntu-latest
    steps:
      - name: Flag the stream root for synthesis when the last child closes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUM: ${{ github.event.issue.number }}
          ACTION: ${{ github.event.action }}
          LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          streams=$(printf '%s' "$LABELS" | tr ',' '\n' | sed -n 's/^stream://p')
          [ -z "$streams" ] && { echo "Not part of a stream."; exit 0; }

          # An issue can (transiently) carry several stream labels — evaluate
          # every one so no stream's drain event is lost.
          for stream in $streams; do
            case "$stream" in ''|*[!0-9]*) echo "Skipping non-numeric stream label 'stream:$stream'."; continue ;; esac
            [ "$NUM" = "$stream" ] && { echo "Root #$stream itself closed/reopened — nothing to gate."; continue; }

            root_state=$(gh issue view "$stream" --repo "$REPO" --json state --jq .state 2>/dev/null || echo "")
            [ "$root_state" != "OPEN" ] && { echo "Stream root #$stream is not open — stream has ended."; continue; }

            if [ "$ACTION" = "reopened" ]; then
              # Work came back — make sure the root isn't sitting in the G1 queue.
              gh issue edit "$stream" --repo "$REPO" --remove-label "status: needs-synthesis" 2>/dev/null || true
              echo "Child #$NUM reopened; root #$stream un-flagged if it was flagged."
              continue
            fi

            # Open children: labelled ones, plus a search for line-convention
            # children whose label sync may have failed (best-effort).
            open_children=$(gh issue list --repo "$REPO" --state open --label "stream:$stream" \
              --json number --jq "[.[] | select(.number != $stream)] | length")
            unlabelled=$(gh issue list --repo "$REPO" --state open --search "\"Part of #$stream\" in:body" \
              --json number,labels \
              --jq "[.[] | select(.number != $stream) | select([.labels[].name] | index(\"stream:$stream\") | not)] | length" 2>/dev/null || echo 0)

            if [ "$open_children" = "0" ] && [ "$unlabelled" = "0" ]; then
              # Also strip awaiting-direction: a re-drain (e.g. auto follow-up
              # research closing, ADR-0012) puts the stream back in the
              # MACHINE's court — re-synthesis runs before the steward gate.
              gh issue edit "$stream" --repo "$REPO" --add-label "status: needs-synthesis" --remove-label "status: awaiting-direction" || true
              gh issue comment "$stream" --repo "$REPO" --body "🧭 All open work in **Stream #$stream** is done. This is **gate G1**. Anyone can run \`./synthesize_work.sh\` to have an agent draft the plain-language overview as a PR; a human **steward** then edits it, writes the direction decision — go deeper, pivot, proceed, or park — and merges. See \`docs/STREAMS.md\`. Nothing moves to solutions until then. (Automation counts labelled children — worth a quick scan for stragglers before synthesising.)" || true
              echo "Stream #$stream drained → root flagged needs-synthesis."
            else
              echo "Stream #$stream still has $open_children labelled + $unlabelled unlabelled open child issue(s)."
            fi
          done

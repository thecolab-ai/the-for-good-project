# Label taxonomy for The For Good Project.
# Reference for maintainers; the live labels are created on the repo to match.
# Groups: stage (where in the pipeline), status (claim state), domain (problem area), meta.

# --- Stage: where a piece of work sits in the pipeline ---
- name: "stage: discover"
  color: "8B5CF6"
  description: "Framing a real NZ problem into researchable questions"
- name: "stage: research"
  color: "2E4057"
  description: "Investigating one question, with citations"
- name: "stage: ideate"
  color: "0EA5E9"
  description: "Turning findings into feasible solutions"
- name: "stage: build"
  color: "C2410C"
  description: "Implementing a chosen solution"

# --- Status: claim state, to prevent duplicated effort ---
- name: "status: available"
  color: "0E8A16"
  description: "Unclaimed — up for grabs"
- name: "status: claimed"
  color: "FBCA04"
  description: "Someone (or an agent) is working on it"
- name: "status: in-review"
  color: "1D76DB"
  description: "A PR is open and under review"
- name: "status: blocked"
  color: "B60205"
  description: "Waiting on something before it can proceed"
- name: "status: done"
  color: "5319E7"
  description: "Merged and complete"

# --- Domain: problem area (see docs/DOMAINS.md) ---
- name: "domain: child-welfare"
  color: "D4C5F9"
  description: "Child poverty, care & protection, family support"
- name: "domain: grant-access"
  color: "D4C5F9"
  description: "Access to grants, benefits, and social services"
- name: "domain: civic-transparency"
  color: "D4C5F9"
  description: "Open government, accountability, public data"
- name: "domain: ai-policy"
  color: "D4C5F9"
  description: "AI strategy, regulation, and safe adoption in NZ"
- name: "domain: biosecurity"
  color: "D4C5F9"
  description: "Pests, disease, border & environmental biosecurity"
- name: "domain: other"
  color: "D4C5F9"
  description: "A domain not yet formally added"

# --- Meta ---
- name: "good first issue"
  color: "7057FF"
  description: "A good place to start"
- name: "help wanted"
  color: "008672"
  description: "Extra attention / hands welcome"
- name: "needs-triage"
  color: "E4E669"
  description: "New — a maintainer should sort and label it"

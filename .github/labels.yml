# Label taxonomy for The For Good Project.
# Reference for maintainers; the live labels are created on the repo to match.
# Groups: stage (where in the pipeline), status (claim state), domain (problem area), meta.

# --- Stage: where a piece of work sits in the pipeline ---
- name: "stage: discover"
  color: "8B5CF6"
  description: "Framing a real NZ problem into researchable questions"
- name: "stage: research"
  color: "2E4057"
  description: "Investigating one question, with citations"
- name: "stage: ideate"
  color: "0EA5E9"
  description: "Turning findings into feasible solutions"
- name: "stage: build"
  color: "C2410C"
  description: "Implementing a chosen solution"

# --- Status: claim state, to prevent duplicated effort ---
- name: "status: available"
  color: "0E8A16"
  description: "Unclaimed — up for grabs"
- name: "status: claimed"
  color: "FBCA04"
  description: "Someone (or an agent) is working on it"
- name: "status: in-review"
  color: "1D76DB"
  description: "A PR is open and under review"
- name: "status: changes-requested"
  color: "D93F0B"
  description: "Review found problems — back with the author for rework"
- name: "status: needs-synthesis"
  color: "14B8A6"
  description: "Research has landed — a human must synthesise the stream before ideation (gate G1)"
- name: "status: awaiting-direction"
  color: "8250DF"
  description: "Waiting on the stream steward's direction decision"
- name: "status: blocked"
  color: "B60205"
  description: "Human-set only: waiting on something. Runners ignore it (they only pick up status: available)"
- name: "status: done"
  color: "5319E7"
  description: "Merged and complete"

# --- Domain: problem area (see docs/DOMAINS.md) ---
- name: "domain: child-welfare"
  color: "D4C5F9"
  description: "Child poverty, care & protection, family support"
- name: "domain: grant-access"
  color: "D4C5F9"
  description: "Access to grants, benefits, and social services"
- name: "domain: civic-transparency"
  color: "D4C5F9"
  description: "Open government, accountability, public data"
- name: "domain: ai-policy"
  color: "D4C5F9"
  description: "AI strategy, regulation, and safe adoption in NZ"
- name: "domain: biosecurity"
  color: "D4C5F9"
  description: "Pests, disease, border & environmental biosecurity"
- name: "domain: other"
  color: "D4C5F9"
  description: "A domain not yet formally added"

# --- Streams: durable threads of work (see docs/STREAMS.md) ---
# stream:<n> labels are created automatically by .github/workflows/stream-sync.yml
# when a Discover issue opens (n = the root issue's number) and propagated to every
# child issue/PR that declares "Stream: #n" or "Part of #<parent>".
- name: "feedback"
  color: "0EA5E9"
  description: "Stakeholder / domain-expert feedback on a stream"

# --- Review: PR-scoped review-loop markers (NOT issue lifecycle states) ---
- name: "review: claimed"
  color: "FEF2C0"
  description: "A reviewer (review_work.sh) is holding this PR — prevents double-review"
- name: "review: human-only"
  color: "B60205"
  description: "Pipeline/governance change: a human maintainer reviews and merges; agent reviewers skip it"

# --- Human controls ---
- name: "do-not-automate"
  color: "000000"
  description: "Human parking brake: no runner will pick this up, whatever its status"

# --- People (see partners/) ---
- name: "partner"
  color: "0EA5E9"
  description: "Relates to a partner organisation"
- name: "sme"
  color: "0EA5E9"
  description: "Relates to a subject-matter expert / advisor"

# --- Priority: set on stream roots; stream-sync propagates to children for queue ordering ---
- name: "priority: high"
  color: "B60205"
  description: "Stream-level queue jump — inherited by children for start_work.sh/review ordering"

# --- Meta ---
- name: "good first issue"
  color: "7057FF"
  description: "A good place to start"
- name: "help wanted"
  color: "008672"
  description: "Extra attention / hands welcome"
- name: "needs-triage"
  color: "E4E669"
  description: "New — a maintainer should sort and label it"
